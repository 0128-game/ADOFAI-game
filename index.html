<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ADOFAI Style Web Game v2</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #1a1a1a;
            color: #fff;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        #game-container {
            display: flex;
            gap: 20px;
            margin-top: 20px;
        }
        canvas {
            background: #111;
            border: 2px solid #444;
            border-radius: 8px;
        }
        .controls {
            background: #2b2b2b;
            padding: 20px;
            border-radius: 8px;
            width: 320px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        label {
            display: flex;
            flex-direction: column;
            font-size: 14px;
            color: #ccc;
        }
        input, select, button {
            margin-top: 5px;
            padding: 8px;
            border-radius: 4px;
            border: 1px solid #444;
            background: #444;
            color: #fff;
        }
        button {
            cursor: pointer;
            background: #007bff;
            border: none;
            font-weight: bold;
        }
        button:hover {
            background: #0056b3;
        }
        .angle-selector {
            display: flex;
            gap: 5px;
            align-items: center;
        }
        #chart-list {
            max-height: 120px;
            overflow-y: auto;
            background: #111;
            padding: 5px;
            font-size: 12px;
        }
    </style>
</head>
<body>

    <h1>ADOFAI Style Web Game (2 Balls & 30° Snapping)</h1>
    
    <div id="player"></div>

    <div id="game-container">
        <div>
            <canvas id="gameCanvas" width="600" height="400"></canvas>
            <div style="margin-top: 10px; text-align: center;">
                <p>Spaceキーまたはキーボードのキーを押してタイミングよくクリック！</p>
                <h3 id="score-text">Hit: 0 / Total: 0</h3>
            </div>
        </div>

        <div class="controls">
            <h3>譜面設定</h3>
            <label>
                YouTube 動画ID:
                <input type="text" id="youtube-id" value="dQw4w9WgXcQ">
            </label>
            <label>
                基本BPM:
                <input type="number" id="base-bpm" value="120">
            </label>
            <button id="load-video-btn">動画を読み込む/リセット</button>

            <hr style="border: 0.5px solid #444; width: 100%;">

            <h3>ノーツ追加 (30°刻み)</h3>
            <p style="font-size: 11px; color: #aaa;">動画再生中に角度を選んで「追加」を押します。<br>(0°=右, 90°=上, 180°=左, 270°=下)</p>
            <div class="angle-selector">
                <select id="angle-input">
                    <option value="0">0° (右)</option>
                    <option value="30">30°</option>
                    <option value="60">60°</option>
                    <option value="90">90° (上)</option>
                    <option value="120">120°</option>
                    <option value="150">150°</option>
                    <option value="180">180° (左)</option>
                    <option value="210">210°</option>
                    <option value="240">240°</option>
                    <option value="270">270° (下)</option>
                    <option value="300">300°</option>
                    <option value="315">330°</option>
                </select>
                <button onclick="addNoteFromInput()" style="flex-grow: 1;">ノーツ追加</button>
            </div>

            <div id="chart-list">ここに譜面データが表示されます</div>

            <hr style="border: 0.5px solid #444; width: 100%;">

            <button id="download-json-btn" style="background: #28a745;">JSONをダウンロード</button>
            <label style="margin-top: 5px;">
                JSON譜面を読み込み:
                <input type="file" id="upload-json" accept=".json">
            </label>
        </div>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>

    <script>
        let player;
        let bpm = 120;
        let chart = []; // { time: 秒, angle: 度 }
        let currentNoteIndex = 0;
        let score = 0;

        // タイル（パス）の座標
        let pathPoints = [{ x: 300, y: 200 }];
        const TILE_DISTANCE = 50; // タイル間の距離

        // 2つのボールのデータ
        let ballRed = { x: 300, y: 200, color: '#ff4757' };
        let ballBlue = { x: 250, y: 200, color: '#54a0ff' };
        
        // どちらが回転しているか (0: 赤が回転/青が固定, 1: 青が回転/赤が固定)
        let activeBall = 0; 
        let currentAngle = 0; // 現在の回転角(ラジアン)

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player', {
                height: '160',
                width: '320',
                videoId: document.getElementById('youtube-id').value,
                events: { 'onReady': () => console.log("Player Ready") }
            });
        }

        document.getElementById('load-video-btn').addEventListener('click', () => {
            const videoId = document.getElementById('youtube-id').value;
            bpm = parseFloat(document.getElementById('base-bpm').value) || 120;
            if (player && player.loadVideoById) {
                player.loadVideoById(videoId);
                resetGame();
            }
        });

        // --- エディタ機能 ---
        function addNoteFromInput() {
            if (!player || typeof player.getCurrentTime !== 'function') return;
            const currentTime = player.getCurrentTime();
            const angleDeg = parseFloat(document.getElementById('angle-input').value);
            
            chart.push({ time: currentTime, angle: angleDeg });
            chart.sort((a, b) => a.time - b.time);
            
            updateChartList();
            generatePath();
        }

        function updateChartList() {
            const listDiv = document.getElementById('chart-list');
            listDiv.innerHTML = chart.map((n, i) => `[${i}] ${n.time.toFixed(2)}s: ${n.angle}°`).join('<br>');
        }

        function resetGame() {
            currentNoteIndex = 0;
            score = 0;
            activeBall = 0; 
            document.getElementById('score-text').innerText = `Hit: 0 / Total: ${chart.length}`;
            generatePath();
        }

        // 30°間隔の角度情報から、タイル（マス）の座標を一本道として計算
        function generatePath() {
            pathPoints = [{ x: 200, y: 250 }]; // スタート位置
            let curX = 200;
            let curY = 250;

            chart.forEach(note => {
                // ADOFAIはベースが右(0度)で反時計回りに角度が進むため、ラジアンに変換
                // CanvasのY軸は下方向が正なので、マイナスをかけて上下を反転
                const rad = (note.angle * Math.PI) / 180;
                curX += Math.cos(rad) * TILE_DISTANCE;
                curY -= Math.sin(rad) * TILE_DISTANCE; 
                pathPoints.push({ x: curX, y: curY });
            });
        }

        // --- ゲームループ ---
        function gameLoop() {
            requestAnimationFrame(gameLoop);
            if (!player || typeof player.getPlayerState !== 'function') return;
            
            if (player.getPlayerState() === YT.PlayerState.PLAYING) {
                const timeSec = player.getCurrentTime();
                // 1拍（BPM）で180度(πラジアン)回転する計算
                const radiansPerSecond = (bpm / 60) * Math.PI;
                
                // ターンごとに回転方向が交互に入れ替わる本家仕様を再現
                // (activeBallの偶奇によって回転の向きを制御)
                if (activeBall === 0) {
                    currentAngle = timeSec * radiansPerSecond;
                } else {
                    currentAngle = -timeSec * radiansPerSecond;
                }

                // 固定されている側（ピボット）の位置を基準に、もう一方を回転させる
                if (currentNoteIndex < pathPoints.length) {
                    const pivot = pathPoints[currentNoteIndex];
                    
                    if (activeBall === 0) {
                        // 青が固定、赤が回転
                        ballBlue.x = pivot.x;
                        ballBlue.y = pivot.y;
                        ballRed.x = pivot.x + Math.cos(currentAngle) * TILE_DISTANCE;
                        ballRed.y = pivot.y + Math.sin(currentAngle) * TILE_DISTANCE;
                    } else {
                        // 赤が固定、青が回転
                        ballRed.x = pivot.x;
                        ballRed.y = pivot.y;
                        ballBlue.x = pivot.x + Math.cos(currentAngle) * TILE_DISTANCE;
                        ballBlue.y = pivot.y + Math.sin(currentAngle) * TILE_DISTANCE;
                    }
                }
            }

            // 描画
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 1. タイル（ライン）描画
            if (pathPoints.length > 0) {
                ctx.beginPath();
                ctx.strokeStyle = '#333';
                ctx.lineWidth = 8;
                ctx.moveTo(pathPoints[0].x, pathPoints[0].y);
                for (let i = 1; i < pathPoints.length; i++) {
                    ctx.lineTo(pathPoints[i].x, pathPoints[i].y);
                }
                ctx.stroke();

                pathPoints.forEach((pt, idx) => {
                    ctx.beginPath();
                    ctx.fillStyle = idx === currentNoteIndex + 1 ? '#ff9f43' : (idx <= currentNoteIndex ? '#555' : '#fff');
                    ctx.arc(pt.x, pt.y, 10, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.strokeStyle = '#aaa';
                    ctx.lineWidth = 2;
                    ctx.stroke();
                });
            }

            // 2. 2つのボールを描画
            ctx.beginPath();
            ctx.fillStyle = ballBlue.color;
            ctx.arc(ballBlue.x, ballBlue.y, 12, 0, Math.PI * 2);
            ctx.fill();

            ctx.beginPath();
            ctx.fillStyle = ballRed.color;
            ctx.arc(ballRed.x, ballRed.y, 12, 0, Math.PI * 2);
            ctx.fill();
        }

        // --- 判定処理 ---
        window.addEventListener('keydown', (e) => {
            // エディタの入力欄にフォーカスがある時はゲームのキー入力を無効化
            if (document.activeElement.tagName === 'INPUT' || document.activeElement.tagName === 'SELECT') return;

            if (currentNoteIndex >= chart.length) return;

            const currentTime = player.getCurrentTime();
            const targetTime = chart[currentNoteIndex].time;
            const diff = Math.abs(currentTime - targetTime);

            // 判定（0.15秒以内なら成功）
            if (diff < 0.15) {
                score++;
                currentNoteIndex++;
                // 成功したら回転するボールを入れ替える（交代）
                activeBall = activeBall === 0 ? 1 : 0;
                document.getElementById('score-text').innerText = `Hit: ${score} / Total: ${chart.length}`;
            } else {
                console.log("Miss! ズレ秒:", diff.toFixed(3));
            }
        });

        // --- JSON 保存＆読込 ---
        document.getElementById('download-json-btn').addEventListener('click', () => {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify({
                youtubeId: document.getElementById('youtube-id').value,
                bpm: bpm,
                chart: chart
            }, null, 2));
            const downloadAnchor = document.createElement('a');
            downloadAnchor.setAttribute("href", dataStr);
            downloadAnchor.setAttribute("download", "adofai_30deg_chart.json");
            document.body.appendChild(downloadAnchor);
            downloadAnchor.click();
            downloadAnchor.remove();
        });

        document.getElementById('upload-json').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(evt) {
                try {
                    const parsed = JSON.parse(evt.target.result);
                    document.getElementById('youtube-id').value = parsed.youtubeId || "";
                    document.getElementById('base-bpm').value = parsed.bpm || 120;
                    bpm = parsed.bpm || 120;
                    chart = parsed.chart || [];
                    updateChartList();
                    if (player && player.loadVideoById) player.loadVideoById(parsed.youtubeId);
                    resetGame();
                    alert("30°対応譜面を読み込みました！");
                } catch (err) {
                    alert("JSONファイルが不正です。");
                }
            };
            reader.readAsText(file);
        });

        requestAnimationFrame(gameLoop);
    </script>
</body>
</html>
